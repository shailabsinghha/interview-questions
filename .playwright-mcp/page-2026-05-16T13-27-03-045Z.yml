              - generic [ref=e404]:
                - button "Show Solution " [ref=e405] [cursor=pointer]:
                  - generic [ref=e406]: Show Solution
                  - generic [ref=e407]: 
                - paragraph [ref=e408]: Blue-green deployment involves running two identical environments - one serves production traffic (blue), while the other hosts a new version (green). Traffic is gradually switched, allowing seamless updates with minimal downtime.
