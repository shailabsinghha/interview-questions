              - generic [ref=e295]: Medium
            - generic [ref=e296]:
              - paragraph [ref=e297]: "[Spring Boot] In a Kubernetes cluster with auto-scaling: Spring Data JPA repository method 'findByStatusAndCreatedDateBetween' returns stale data. The database has newer records but the query returns old results."
              - generic [ref=e298]:
                - button "Show Solution " [ref=e299] [cursor=pointer]:
                  - generic [ref=e300]: Show Solution
                  - generic [ref=e301]: 
                - paragraph [ref=e302]: 1) Check if Hibernate's first-level cache is returning cached entities - use entityManager.clear() or entityManager.detach(). 2) For second-level cache, verify cache eviction is working. 3) Add '@Modifying(clearAutomatically = true)' if this follows a modifying query. 4) Check transaction isolation level - READ_COMMITTED should see committed changes. 5) Verify the query parameters (date range) are correct - timezone issues can cause date mismatches. 6) Use 'entityManager.flush()' before querying if writes haven't been flushed. 7) Disable query result cache for this method if caching is enabled. Schedule a team knowledge-sharing session on this topic.
