              - generic [ref=e282]: Medium
            - generic [ref=e283]:
              - paragraph [ref=e284]: "[Spring Boot] Liquibase migration fails with 'Validation Failed: 1 checksums differ'. The migration file wasn't modified but the checksum changed."
              - generic [ref=e285]:
                - button "Show Solution " [ref=e286] [cursor=pointer]:
                  - generic [ref=e287]: Show Solution
                  - generic [ref=e288]: 
                - paragraph [ref=e289]: "1) Line ending changes (CRLF vs LF) can change checksums even if content is the same. 2) Run 'liquibase clearChecksums' to recalculate all checksums. 3) For Spring Boot: 'spring.liquibase.clear-checksums=true' (one-time use). 4) Check if the changelog file was reformatted by an IDE or linter. 5) Use 'liquibase validate' to see which changesets have mismatched checksums. 6) For intentional changes, use 'liquibase calculateChecksum' to get the new checksum and update the database. 7) Store changelog files with consistent line endings in version control (use .gitattributes)."
          - generic [ref=e290]:
