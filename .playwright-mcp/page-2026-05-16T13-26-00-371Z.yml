              - paragraph [ref=e206]: "[Spring Boot] During a security audit: Spring Boot application fails to start in Docker container with exit code 137. The logs show nothing unusual before termination. What's happening?"
              - generic [ref=e207]:
                - button "Show Solution " [ref=e208] [cursor=pointer]:
                  - generic [ref=e209]: Show Solution
                  - generic [ref=e210]: 
                - paragraph [ref=e211]: "Exit code 137 means OOMKilled (128 + SIGKILL 9). 1) Check container memory limits with 'docker inspect'. 2) Increase JVM heap: '-Xmx512m -Xms256m' in JAVA_OPTS. 3) Set container memory limit higher than JVM max heap (JVM needs extra for metaspace, threads, native memory). 4) Use '-XX:+UseContainerSupport -XX:MaxRAMPercentage=75.0' for container-aware JVM. 5) Monitor with 'docker stats' during startup. 6) Check for memory leaks in application code. Add integration tests to prevent regression."
