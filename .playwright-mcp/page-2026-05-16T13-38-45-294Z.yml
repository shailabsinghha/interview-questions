            - generic [ref=e448]:
              - paragraph [ref=e449]: "[Spring Boot] In a regulated financial services environment: After adding spring-boot-starter-actuator, the application fails to start with 'Multiple representations of the same entity X are being merged'. What's the conflict?"
              - generic [ref=e450]:
                - button "Show Solution " [ref=e451] [cursor=pointer]:
                  - generic [ref=e452]: Show Solution
                  - generic [ref=e453]: 
                - paragraph [ref=e454]: 1) This is typically a JPA/Hibernate issue, not directly actuator-related. 2) Check if actuator's /entities endpoint is exposing entities with lazy-loaded relationships. 3) Configure 'spring.jpa.open-in-view=false' to avoid lazy loading issues. 4) Use DTOs instead of exposing entities directly through actuator endpoints. 5) Check for duplicate entity manager configurations. 6) Review actuator endpoint exposure settings in application.properties. Add this scenario to the on-call runbook.
          - generic [ref=e455]:
