            - generic [ref=e474]:
              - paragraph [ref=e475]: "[Spring Boot] In a real-time data processing pipeline: Two @Transactional methods calling each other within the same class - the inner method's propagation setting (REQUIRES_NEW) is ignored. Both run in the same transaction."
              - generic [ref=e476]:
                - button "Show Solution " [ref=e477] [cursor=pointer]:
                  - generic [ref=e478]: Show Solution
                  - generic [ref=e479]: 
                - paragraph [ref=e480]: "1) Spring's AOP proxy doesn't work for self-invocation - calling method B from method A in the same class bypasses the proxy. 2) Inject the service into itself (self-injection) to go through the proxy. 3) Use AopContext.currentProxy() to get the proxied reference: '((MyService) AopContext.currentProxy()).methodB()'. 4) Enable proxy exposure: '@EnableAspectJAutoProxy(exposeProxy = true)'. 5) Better: split the methods into separate service classes. 6) Use TransactionTemplate for programmatic transaction control. 7) This is a common Spring gotcha - always be aware of proxy limitations. Create a post-mortem document for the team."
