                - checkbox
              - generic [ref=e459]: Spring Boot
              - generic [ref=e460]: Easy
            - generic [ref=e461]:
              - paragraph [ref=e462]: Is it possible to change the port of the embedded Tomcat server in Spring Boot?
              - generic [ref=e463]:
                - button "Show Solution " [ref=e464] [cursor=pointer]:
                  - generic [ref=e465]: Show Solution
                  - generic [ref=e466]: 
                - paragraph [ref=e467]: "Yes, it is possible to change the port by setting the server.port property in the application.properties file. For example: server.port=8081 changes the port to 8081."
          - generic [ref=e468]:
